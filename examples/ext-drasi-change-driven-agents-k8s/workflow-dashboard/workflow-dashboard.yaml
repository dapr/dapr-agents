apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-dashboard-state
data:
  state.yaml: |
    apiVersion: dapr.io/v1alpha1
    kind: Component
    metadata:
      name: workflow-runtime
    spec:
      type: state.redis
      version: v1
      metadata:
      - name: redisHost
        value: redis:6379
      - name: redisPassword
        value: ""
      - name: keyPrefix
        value: "none"
      - name: actorStateStore
        value: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-dashboard
  template:
    metadata:
      labels:
        app: workflow-dashboard
    spec:
      containers:
      - name: workflow-dashboard
        image: ghcr.io/diagridio/diagrid-dashboard:latest
        imagePullPolicy: Always
        env:
        - name: COMPONENT_FILE
          value: /app/components/state.yaml
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: state-component
          mountPath: /app/components
          readOnly: true
      volumes:
      - name: state-component
        configMap:
          name: workflow-dashboard-state
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-dashboard
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
    name: http
  selector:
    app: workflow-dashboard
