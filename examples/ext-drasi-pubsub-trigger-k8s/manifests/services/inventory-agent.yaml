apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-agent
  labels:
    app: inventory-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-agent
  template:
    metadata:
      labels:
        app: inventory-agent
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "inventory-agent"
        dapr.io/enable-api-logging: "true"
        dapr.io/log-level: "info"
    spec:
      containers:
      - name: inventory-agent
        image: local-registry:5000/inventory-agent:latest
        imagePullPolicy: Always
        env:
        - name: AGENT_CONVERSATION_COMPONENT
          value: "agent-llm"
        - name: AGENT_MEMORY_COMPONENT
          value: "agent-memory"
        - name: AGENT_RUNTIME_COMPONENT
          value: "agent-runtime"
        - name: AGENT_PUBSUB_COMPONENT
          value: "agent-pubsub"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
