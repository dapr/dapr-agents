[mypy]
python_version = 3.10
warn_unused_configs = True
warn_redundant_casts = True
show_error_codes = True
check_untyped_defs = True
install_types = True
non_interactive = True
namespace_packages = True
explicit_package_bases = True
plugins = pydantic.mypy

# TODO: these should be dynamically generated
mypy_path =.:ext/dapr-agents-ext-drasi

files =
    dapr_agents/**/*.py,
    ext/**/*.py,

exclude =
    cookbook/**/*.py,
    quickstarts/**/*.py,

[mypy-dapr_agents.agents.*]
ignore_errors = True

[mypy-dapr_agents.document.*]
ignore_errors = True

[mypy-dapr_agents.llm.*]
ignore_errors = True

[mypy-dapr_agents.memory.*]
ignore_errors = True

[mypy-dapr_agents.prompt.*]
ignore_errors = True

[mypy-dapr_agents.service.*]
ignore_errors = True

[mypy-dapr_agents.storage.*]
ignore_errors = True

[mypy-dapr_agents.tool.mcp.*]
ignore_errors = True

[mypy-dapr_agents.tool.http.*]
ignore_errors = True

[mypy-dapr_agents.tool.utils.*]
ignore_errors = True

[mypy-dapr_agents.tool.openapi.*]
ignore_errors = True

[mypy-dapr_agents.tool.base.*]
ignore_errors = True

[mypy-dapr_agents.workflow.*]
ignore_errors = True

[mypy-dapr_agents.pubsub.*]
ignore_errors = True

[mypy-dapr_agents.observability.*]
ignore_errors = True

[mypy-dapr_agents.ext.*]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True
